<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>📄 Notes Summarizer - StudApp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  
  :root {
    --bg: linear-gradient(135deg, #e3f2fd, #f1f5fe);
    --text: #130404;
    --card-bg: #ffffff;
    --accent: #3f51b5;
    --accent2: #1e3a8a;
    --accent-hover: #1e40af;
    --input-bg: #ffffff;
    --input-text: #130404;
    --summary-bg: #eaf0f6;
    --summary-text: #130404;
    --border: #d1d5db;
    --muted: #374151;
    --subtitle: #1e40af;
  }

  [data-theme="dark"] {
    --bg: linear-gradient(135deg, #121212, #1a1a2e);
    --text: #e8eaf6;
    --card-bg: #23263a;
    --accent: #7986cb;
    --accent2: #3b50a8;
    --accent-hover: #5c6bc0;
    --input-bg: #2c2f3a;
    --input-text: #e8eaf6;
    --summary-bg: #1a1a2e;
    --summary-text: #e8eaf6;
    --border: #444;
    --muted: #aab6f3;
    --subtitle: #aab6f3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    padding-top: 80px;
    transition: all 0.3s ease;
  }

  header, footer {
    background-color: var(--card-bg);
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    padding: 1rem 2rem;
    position: fixed;
    width: 100%;
    z-index: 1000;
    border-radius: 0 0 15px 15px;
  }

  header { top: 0; }
  footer {
    bottom: 0;
    text-align: center;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .container {
    max-width: 850px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background-color: var(--card-bg);
    color: var(--text);
    border-radius: 15px;
    border: 1px solid var(--border);
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    padding: 25px;
    margin-bottom: 30px;
    transition: all 0.3s ease;
  }

  .form-control {
    background-color: var(--input-bg);
    color: var(--input-text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    transition: all 0.3s ease;
  }

  .form-control::placeholder {
    color: var(--muted);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--accent-hover), var(--accent));
  }

  .summary-box {
    background-color: var(--summary-bg);
    color: var(--summary-text);
    padding: 18px;
    border-radius: 12px;
    white-space: pre-wrap;
    margin-top: 15px;
    border: 1px solid var(--border);
    transition: background 0.3s ease, color 0.3s ease;
  }

  .summary-title {
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--accent2);
    font-size: 1rem;
  }

  .loading-text {
    font-style: italic;
    color: var(--subtitle);
  }

  .subtitle-text {
    color: var(--subtitle);
    font-size: 0.95rem;
    margin-bottom: 15px;
  }

  .form-check-label {
    color: var(--text);
  }

  h4, h5 {
    font-weight: 600;
  }

  @media (max-width: 576px) {
    .header-content {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <h5>📄 Notes Summarizer</h5>
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <a href="/student_dashboard/{{ user_id }}" class="btn btn-sm btn-outline-primary">📊 Dashboard</a>
      <a href="/notes_summarizer/{{ user_id }}" class="btn btn-sm btn-outline-primary">📄 Notes</a>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="themeSwitch">
        <label class="form-check-label" for="themeSwitch">🌙</label>
      </div>
      <a href="/" class="btn btn-sm btn-outline-danger">🚪 Logout</a>
    </div>
  </div>
</header>

<div class="container">
  <div class="card text-center">
    <h4>📤 Upload Notes to Summarize</h4>
    <p class="subtitle-text">Supports PDF and DOCX files (text-based only)</p>
    <form id="uploadForm" enctype="multipart/form-data" onsubmit="handleUpload(event)">
      <div class="mb-3 mt-3">
        <input type="file" name="file" id="fileInput" accept=".pdf,.doc,.docx" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary">Summarize Notes</button>
    </form>
  </div>

  <div class="card" id="resultsCard" style="display: none;">
    <h5>🧠 Summaries by Page</h5>
    <div id="summaryResults" class="loading-text">Processing...</div>
  </div>
</div>

<footer>
  © 2025 StudApp. All rights reserved.
  <img src="/static/dnlogo.png" style="height:30px" alt="StudApp Logo" data-aos="zoom-in">
</footer>

<script>
  // Theme toggle
  const themeSwitch = document.getElementById('themeSwitch');
  const currentTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', currentTheme);
  if (currentTheme === 'dark') themeSwitch.checked = true;

  themeSwitch.addEventListener('change', () => {
    const theme = themeSwitch.checked ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  });

  // File upload & summarization
  function handleUpload(e) {
    e.preventDefault();
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    if (!file) return alert("Please choose a PDF or DOCX file.");

    const formData = new FormData();
    formData.append("file", file);

    const resultsCard = document.getElementById("resultsCard");
    const summaryBox = document.getElementById("summaryResults");
    resultsCard.style.display = "block";
    summaryBox.innerHTML = "<span class='loading-text'>⏳ Uploading and summarizing...</span>";

    fetch("/summarize_notes_all_pages", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.pages && data.pages.length > 0) {
        let output = '';
        data.pages.forEach((summary, index) => {
          const cleanSummary = summary.replace(/[*_~`]/g, '');
          output += `
            <div class="summary-box">
              <div class="summary-title">📄 Page ${index + 1}</div>
              <div>${cleanSummary}</div>
            </div>
          `;
        });
        summaryBox.innerHTML = output;
      } else {
        summaryBox.innerHTML = "⚠️ No summaries returned.";
      }
    })
    .catch(() => {
      summaryBox.innerHTML = "❌ Something went wrong. Please try again.";
    });
  }
</script>

</body>
</html>
